<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>BitGate CAD v1.5 - Industrial Edition</title>
    <link rel="stylesheet" href="./ui/style.css">
</head>
<body>
    <div id="toolbar">
        <button onclick="addComponent('BAT')">POWER</button>
        <button onclick="addComponent('RES')">RESISTOR</button>
        <button onclick="addComponent('LED')">LED</button>
        <button onclick="addComponent('PSW')">PUSH SW</button>
        <button onclick="addComponent('SSW')">SLIDE SW</button>
        <button onclick="addComponent('TR')">TRANSISTOR</button>
        <div class="separator"></div>
        <button id="startBtn">RUN SYSTEM</button>
        <button id="delBtn" disabled>DELETE</button>
        <span id="statusDisp">SYSTEM READY</span>
    </div>

    <div id="canvas-container">
        <canvas id="cvs" width="1200" height="800"></canvas>
    </div>

    <div id="editArea">
        <span id="targetLabel">VALUE</span>: 
        <input type="number" id="valInput">
        <select id="typeSelect" style="display:none">
            <option value="NPN">NPN</option>
            <option value="PNP">PNP</option>
        </select>
    </div>

    <script src="components.js"></script>
    <script src="engine.js"></script>
    <script src="ui.js"></script>
    <script src="main.js"></script>
</body>
</html>
