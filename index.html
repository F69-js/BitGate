<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>BitGate CAD v1.0.1</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --panel-bg: #2c3e50;
            --accent-color: #2ecc71;
            --text-color: #ecf0f1;
            --danger-color: #e74c3c;
            --warning-color: #f39c12;
        }
        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            display: flex; flex-direction: column;
            height: 100vh; overflow: hidden;
        }
        header {
            height: 60px; padding: 0 25px;
            background: var(--panel-bg);
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 3px solid var(--accent-color);
            z-index: 10;
        }
        .logo { font-size: 1.5em; font-weight: 900; letter-spacing: 2px; color: var(--accent-color); }
        .logo span { color: #fff; font-weight: 300; }
        main { display: flex; flex: 1; overflow: hidden; }
        #palette {
            width: 160px; background: var(--panel-bg);
            padding: 15px; display: grid; grid-template-columns: 1fr;
            grid-gap: 12px; align-content: start;
            border-right: 1px solid #444;
        }
        .part-btn {
            background: #34495e; color: #fff; border: 1px solid #555;
            padding: 12px 5px; text-align: center; cursor: pointer;
            font-size: 0.8em; border-radius: 4px; transition: 0.2s;
        }
        .part-btn:hover { background: var(--accent-color); transform: translateX(5px); }
        #viewport { flex: 1; overflow: auto; background: #333; position: relative; }
        canvas { background: #fafafa; display: block; cursor: crosshair; }
        .controls { display: flex; align-items: center; gap: 15px; }
        .btn-action {
            background: var(--accent-color); color: white; border: none;
            padding: 10px 20px; border-radius: 5px; cursor: pointer;
            font-weight: bold; transition: 0.2s;
        }
        .btn-action.active { background: var(--warning-color); box-shadow: 0 0 15px rgba(243, 156, 18, 0.4); }
        .btn-del { background: var(--danger-color); }
        .btn-del:disabled { opacity: 0.3; cursor: not-allowed; }
        .edit-zone {
            display: flex; align-items: center; gap: 10px;
            background: #111; padding: 5px 15px; border-radius: 20px;
            border: 1px solid var(--accent-color); visibility: hidden;
        }
        .edit-zone input {
            width: 70px; background: transparent; color: var(--accent-color);
            border: none; outline: none; text-align: right; font-family: monospace; font-size: 1.1em;
        }
        .stats { font-family: 'Courier New', monospace; color: var(--accent-color); font-size: 0.85em; min-width: 180px; text-align: right; }
    </style>
</head>
<body>

<header>
    <div class="logo">Bit<span>Gate</span> <small style="font-size:0.4em; opacity:0.6;">v1.0.1</small></div>
    <div class="controls">
        <button id="startBtn" class="btn-action">RUN SYSTEM</button>
        <div id="editArea" class="edit-zone">
            <span id="targetLabel" style="color:#777; font-size:0.7em;">VALUE</span>
            <input type="number" id="valInput">
        </div>
        <button id="delBtn" class="btn-action btn-del" disabled>DELETE</button>
    </div>
    <div id="statusDisp" class="stats">SYSTEM READY</div>
</header>

<main>
    <div id="palette">
        <div class="part-btn" onclick="addComponent('BAT')">POWER (V)</div>
        <div class="part-btn" onclick="addComponent('RES')">RESISTOR (Ω)</div>
        <div class="part-btn" onclick="addComponent('LED')">LED UNIT</div>
        <div class="part-btn" onclick="addComponent('PSW')">PUSH SW</div>
        <div class="part-btn" onclick="addComponent('SSW')">SLIDE SW</div>
    </div>
    <div id="viewport"><canvas id="cvs" width="2000" height="2000"></canvas></div>
</main>

<script>
    const canvas = document.getElementById('cvs');
    const ctx = canvas.getContext('2d');
    const PIN_RADIUS = 7;
    
    let isSimulating = false;
    let components = [];
    let wires = [];
    let activeLine = null;
    let draggingObj = null;
    let draggingPoint = null;
    let dragOffset = { x: 0, y: 0 };
    let selectedObj = null;
    let mouse = { x: 0, y: 0 };

    // カラーコード定義: 0-9, 10:金(5%), 11:銀(10%)
    const COLOR_MAP = ["#000", "#8B4513", "#F00", "#FF8C00", "#FF0", "#0F0", "#00F", "#800080", "#808080", "#FFF", "#D4AF37", "#C0C0C0"];

    function addComponent(type) {
        const id = Date.now();
        const obj = { id, type, x: 100, y: 100, val: (type === 'BAT' ? 9 : type === 'RES' ? 1000 : 220), currentI: 0, state: false };
        if (type === 'BAT') {
            obj.w = 100; obj.h = 60;
            obj.pins = [{ id: id+'p', type: 'POS', relX: 100, relY: 15 }, { id: id+'n', type: 'NEG', relX: 100, relY: 45 }];
        } else if (type === 'LED') {
            obj.w = 50; obj.h = 50;
            obj.pins = [{ id: id+'a', type: 'POS', relX: 0, relY: 15 }, { id: id+'k', type: 'NEG', relX: 0, relY: 35 }];
        } else if (type === 'RES') {
            obj.w = 80; obj.h = 30;
            obj.pins = [{ id: id+'1', type: 'NEU', relX: 0, relY: 15 }, { id: id+'2', type: 'NEU', relX: 80, relY: 15 }];
        } else {
            obj.w = 50; obj.h = 40;
            obj.pins = [{ id: id+'1', type: 'NEU', relX: 0, relY: 20 }, { id: id+'2', type: 'NEU', relX: 50, relY: 20 }];
        }
        components.push(obj);
    }

    function getMousePos(e) {
        const rect = canvas.getBoundingClientRect();
        return { x: e.clientX - rect.left, y: e.clientY - rect.top };
    }

    function distToSegment(p, v, w) {
        const l2 = Math.pow(v.x - w.x, 2) + Math.pow(v.y - w.y, 2);
        if (l2 == 0) return Math.hypot(p.x - v.x, p.y - v.y);
        let t = ((p.x - v.x) * (w.x - v.x) + (p.y - v.y) * (w.y - v.y)) / l2;
        t = Math.max(0, Math.min(1, t));
        return Math.hypot(p.x - (v.x + t * (w.x - v.x)), p.y - (v.y + t * (w.y - v.y)));
    }

    canvas.addEventListener('mousedown', e => {
        const pos = getMousePos(e);
        if (e.button === 2) { activeLine = null; selectedObj = null; updateUI(); return; }

        if (isSimulating) {
            const hitSW = components.find(c => pos.x > c.x && pos.x < c.x + c.w && pos.y > c.y && pos.y < c.y + c.h);
            if (hitSW?.type === 'PSW' || hitSW?.type === 'SSW') {
                if (hitSW.type === 'PSW') hitSW.state = true; else hitSW.state = !hitSW.state;
                selectedObj = { type: 'comp', ref: hitSW };
                updateUI(); return;
            }
        }

        for (let c of components) {
            for (let p of c.pins) {
                if (Math.hypot(pos.x - (c.x + p.relX), pos.y - (c.y + p.relY)) < 15) {
                    if (!activeLine) activeLine = { startComp: c, startPin: p };
                    else {
                        wires.push({ from: { comp: activeLine.startComp, pin: activeLine.startPin }, to: { comp: c, pin: p }, points: [] });
                        activeLine = null;
                    }
                    return;
                }
            }
        }

        for (let w of wires) {
            if (w.points) {
                for (let i = 0; i < w.points.length; i++) {
                    if (Math.hypot(pos.x - w.points[i].x, pos.y - w.points[i].y) < 10) {
                        draggingPoint = { wire: w, index: i };
                        selectedObj = { type: 'wire', ref: w };
                        updateUI(); return;
                    }
                }
            }
        }

        const hitC = components.find(c => pos.x > c.x && pos.x < c.x + c.w && pos.y > c.y && pos.y < c.y + c.h);
        if (hitC) {
            selectedObj = { type: 'comp', ref: hitC };
            draggingObj = hitC;
            dragOffset = { x: pos.x - hitC.x, y: pos.y - hitC.y };
        } else {
            const hitW = wires.find(w => {
                const p1 = { x: w.from.comp.x + w.from.pin.relX, y: w.from.comp.y + w.from.pin.relY };
                const p2 = { x: w.to.comp.x + w.to.pin.relX, y: w.to.comp.y + w.to.pin.relY };
                const pts = [p1, ...(w.points || []), p2];
                for (let i = 0; i < pts.length - 1; i++) {
                    if (distToSegment(pos, pts[i], pts[i+1]) < 8) {
                        w.points = w.points || [];
                        w.points.splice(i, 0, { x: pos.x, y: pos.y });
                        draggingPoint = { wire: w, index: i };
                        return true;
                    }
                }
                return false;
            });
            selectedObj = hitW ? { type: 'wire', ref: hitW } : null;
        }
        updateUI();
    });

    window.addEventListener('mousemove', e => {
        mouse = getMousePos(e);
        if (draggingObj) {
            draggingObj.x = mouse.x - dragOffset.x;
            draggingObj.y = mouse.y - dragOffset.y;
        }
        if (draggingPoint) {
            draggingPoint.wire.points[draggingPoint.index].x = mouse.x;
            draggingPoint.wire.points[draggingPoint.index].y = mouse.y;
        }
    });

    window.addEventListener('mouseup', () => {
        components.forEach(c => { if (c.type === 'PSW') c.state = false; });
        draggingObj = null; draggingPoint = null;
    });

    function updateSimulation() {
        components.forEach(c => c.currentI = 0);
        if (!isSimulating) return;

        components.filter(c => c.type === 'BAT').forEach(bat => {
            const posP = bat.pins.find(p => p.type === 'POS'), negP = bat.pins.find(p => p.type === 'NEG');
            let visited = new Set(), queue = [posP.id], pathComps = [], closed = false;

            while(queue.length > 0) {
                let currId = queue.shift();
                if (visited.has(currId)) continue;
                visited.add(currId);
                if (currId === negP.id) closed = true;

                wires.forEach(w => {
                    if (w.from.pin.id === currId) queue.push(w.to.pin.id);
                    if (w.to.pin.id === currId) queue.push(w.from.pin.id);
                });

                components.forEach(comp => {
                    if (comp.pins.some(p => p.id === currId)) {
                        if ((comp.type === 'PSW' || comp.type === 'SSW') && !comp.state) return;
                        pathComps.push(comp);
                        comp.pins.forEach(p => { if (p.id !== currId) queue.push(p.id); });
                    }
                });
            }

            if (closed) {
                let r = 0;
                pathComps.forEach(c => { if (c.type === 'LED' || c.type === 'RES') r += c.val; });
                const amp = r > 0 ? bat.val / r : 0;
                pathComps.forEach(c => { if (c.type === 'LED') c.currentI = amp; });
                document.getElementById('statusDisp').innerText = "LIVE: " + amp.toFixed(4) + " A";
            } else {
                document.getElementById('statusDisp').innerText = "CIRCUIT OPEN";
            }
        });
    }

    function draw() {
        updateSimulation();
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = '#f1f1f1'; ctx.lineWidth = 1;
        for(let i=0; i<canvas.width; i+=50) {
            ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(canvas.width,i); ctx.stroke();
        }

        wires.forEach(w => {
            const p1 = { x: w.from.comp.x + w.from.pin.relX, y: w.from.comp.y + w.from.pin.relY };
            const p2 = { x: w.to.comp.x + w.to.pin.relX, y: w.to.comp.y + w.to.pin.relY };
            const pts = [p1, ...(w.points || []), p2];
            ctx.beginPath(); ctx.lineWidth = (selectedObj?.ref === w) ? 5 : 3;
            ctx.strokeStyle = (selectedObj?.ref === w) ? '#2ecc71' : '#333';
            ctx.moveTo(pts[0].x, pts[0].y);
            for(let i=1; i<pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
            ctx.stroke();
        });

        components.forEach(c => {
            ctx.strokeStyle = (selectedObj?.ref === c) ? '#2ecc71' : '#222';
            ctx.lineWidth = 2; ctx.fillStyle = '#fff';
            
            if (c.type === 'RES') {
                ctx.fillStyle = '#f3e5ab'; ctx.fillRect(c.x, c.y, c.w, c.h); ctx.strokeRect(c.x, c.y, c.w, c.h);
                const s = Math.floor(c.val).toString();
                let bandColors = [];
                if (c.val < 10) bandColors = [0, Math.floor(c.val), 0];
                else bandColors = [parseInt(s[0]), parseInt(s[1]), s.length - 2];
                // 第1〜3バンド
                bandColors.forEach((colorIdx, i) => {
                    ctx.fillStyle = COLOR_MAP[colorIdx];
                    ctx.fillRect(c.x + 15 + (i * 12), c.y, 7, c.h);
                });
                // 第4バンド (誤差: 金色)
                ctx.fillStyle = COLOR_MAP[10];
                ctx.fillRect(c.x + 55, c.y, 7, c.h);
            } else if (c.type === 'LED') {
                ctx.beginPath(); ctx.arc(c.x+25, c.y+25, 20, 0, Math.PI*2);
                ctx.fillStyle = `rgba(46, 204, 113, ${Math.min(c.currentI*40, 1)})`; ctx.fill(); ctx.stroke();
            } else if (c.type === 'BAT') {
                ctx.fillRect(c.x, c.y, c.w, c.h); ctx.strokeRect(c.x, c.y, c.w, c.h);
                ctx.fillStyle = '#000'; ctx.font = "bold 12px Arial"; ctx.fillText(c.val + "V PWR", c.x+10, c.y+35);
            } else {
                ctx.fillStyle = c.state ? '#2ecc71' : '#e74c3c';
                ctx.fillRect(c.x+10, c.y+10, 30, 20); ctx.strokeRect(c.x, c.y, c.w, c.h);
            }

            c.pins.forEach(p => {
                ctx.beginPath(); ctx.arc(c.x+p.relX, c.y+p.relY, PIN_RADIUS, 0, Math.PI*2);
                ctx.fillStyle = (p.type === 'POS') ? '#e74c3c' : (p.type === 'NEG') ? '#3498db' : '#95a5a6';
                ctx.fill(); ctx.stroke();
            });
        });

        if (activeLine) {
            ctx.strokeStyle = '#2ecc71'; ctx.setLineDash([5,5]); ctx.beginPath();
            ctx.moveTo(activeLine.startComp.x + activeLine.startPin.relX, activeLine.startComp.y + activeLine.startPin.relY);
            ctx.lineTo(mouse.x, mouse.y); ctx.stroke(); ctx.setLineDash([]);
        }
        requestAnimationFrame(draw);
    }

    function updateUI() {
        const editArea = document.getElementById('editArea');
        document.getElementById('delBtn').disabled = !selectedObj;
        if (selectedObj?.type === 'comp' && (selectedObj.ref.type === 'BAT' || selectedObj.ref.type === 'RES')) {
            editArea.style.visibility = 'visible';
            document.getElementById('targetLabel').innerText = selectedObj.ref.type === 'BAT' ? 'POWER (V)' : 'RES (Ω)';
            document.getElementById('valInput').value = selectedObj.ref.val;
        } else editArea.style.visibility = 'hidden';
    }

    document.getElementById('valInput').addEventListener('input', e => { if (selectedObj?.type === 'comp') selectedObj.ref.val = parseFloat(e.target.value) || 0; });
    document.getElementById('delBtn').addEventListener('click', () => {
        if (!selectedObj) return;
        if (selectedObj.type === 'comp') {
            wires = wires.filter(w => w.from.comp !== selectedObj.ref && w.to.comp !== selectedObj.ref);
            components = components.filter(c => c !== selectedObj.ref);
        } else wires = wires.filter(w => w !== selectedObj.ref);
        selectedObj = null; updateUI();
    });
    document.getElementById('startBtn').addEventListener('click', e => {
        isSimulating = !isSimulating; e.target.classList.toggle('active', isSimulating);
        e.target.textContent = isSimulating ? "STOP SYSTEM" : "RUN SYSTEM";
    });
    canvas.addEventListener('contextmenu', e => e.preventDefault());
    draw();
</script>
</body>
</html>
