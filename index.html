<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>BitGate CAD v1.5</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">Bit<span>Gate</span> <small style="font-size:0.4em; opacity:0.6;">v1.5</small></div>
        
        <div class="controls">
            <div id="editArea" class="edit-zone">
                <span id="targetLabel" style="font-size: 0.7em; color: #888;">VALUE</span>
                <input type="number" id="valInput" step="0.1">
                <select id="typeSelect" style="display: none; background: #222; color: #2ecc71; border: none; font-family: monospace;">
                    <option value="NPN">NPN</option>
                    <option value="PNP">PNP</option>
                </select>
            </div>

            <button id="startBtn" class="btn-action">RUN SYSTEM</button>
            <button id="delBtn" class="btn-action btn-del" disabled>DELETE</button>
            <div id="statusDisp" class="stats">SYSTEM READY</div>
        </div>
    </header>

    <main>
        <aside id="palette">
            <div class="part-btn" onclick="addComponent('BAT')">BATTERY</div>
            <div class="part-btn" onclick="addComponent('RES')">RESISTOR</div>
            <div class="part-btn" onclick="addComponent('LED')">LED</div>
            <div class="part-btn" onclick="addComponent('PSW')">PUSH SW</div>
            <div class="part-btn" onclick="addComponent('SSW')">SLIDE SW</div>
            <div class="part-btn" onclick="addComponent('TR')">TRANSISTOR</div>
        </aside>

        <div id="viewport">
            <canvas id="cvs"></canvas>
        </div>
    </main>

    <script src="scripts/components.js"></script>
    <script src="scripts/engine.js"></script>
    <script src="scripts/ui.js"></script>
    <script src="scripts/main.js"></script>
</body>
</html>
