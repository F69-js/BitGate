<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <base href="https://f69-js.github.io/BitGate/">
    <link rel="canonical" href="https://f69-js.github.io/BitGate/">
    <title>BitGate CAD v1.7</title>
    <link rel="stylesheet" href="ui/style.css">
    <link rel="icon" href="static/favicon.png" type="image/x-icon">
    

   <meta name="description" content="実体配線図ベースの回路シミュレータ。図記号ではなく、実物に近い部品で直感的に回路を設計・学習できます。">
   <meta name="keywords" content="BitGate,回路シミュレータ,電子工作,実体配線図,物理演算,74HC04,BitGateCAD,BitGateCad,bitgate,CAD">

   <meta property="og:title" content="BitGate">
   <meta property="og:type" content="website">
   <meta property="og:description" content="直感的な操作で電子工作を学べる、実物志向の回路シミュレータ。">
   <meta property="og:image" content="https://f69-js.github.io/BitGate/static/logo.png">
   <meta name="twitter:card" content="summary">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <meta property="og:url" content="https://f69-js.github.io/BitGate/">
   <link rel="apple-touch-icon" href="static/favicon.png">
</head>
<body>
    <header>
        <div class="logo">
            <a href="https://github.com/f69-js/BitGate" target="_blank">
                <img src="static/logo.png" alt="BitGate Logo" style="height:28px; image-rendering:pixelated;">
            </a>
            <small style="font-size:0.4em; opacity:0.6;">v1.7</small>
         </div>
        
        <div class="controls">
            <div class="file-ops" style="border-right: 1px solid #444; padding-right: 10px; margin-right: 10px;">
                <button id="saveBtn" class="btn-action" onclick="saveCircuit()" style="background: #2c3e50;">SAVE</button>
                <button id="loadBtn" class="btn-action" onclick="loadCircuit()" style="background: #2c3e50;">LOAD</button>
            </div>

            <div id="editArea" class="edit-zone">
                <span id="targetLabel" style="font-size: 0.7em; color: #888;">VALUE</span>
                <input type="number" id="valInput" step="0.1">
                <select id="typeSelect" style="display: none; background: #222; color: #2ecc71; border: none; font-family: monospace;">
                </select>
            </div>

            <button id="startBtn" class="btn-action">RUN SYSTEM</button>
            <button id="delBtn" class="btn-action btn-del" disabled>DELETE</button>
            <div id="statusDisp" class="stats">SYSTEM READY</div>
        </div>
    </header>

    <main>
        <aside id="palette">
            <div class="part-btn" onclick="addComponent('BAT')">BATTERY</div>
            <div class="part-btn" onclick="addComponent('RES')">RESISTOR</div>
            <div class="part-btn" onclick="addComponent('CAP')">CAPASITOR</div>
            <div class="part-btn" onclick="addComponent('DIO')">DIODE</div>
            <div class="part-btn" onclick="addComponent('LED')">LED</div>
            <div class="part-btn" onclick="addComponent('PSW')">PUSH SW</div>
            <div class="part-btn" onclick="addComponent('SSW')">SLIDE SW</div>
            <div class="part-btn" onclick="addComponent('TR')">TRANSISTOR</div>
            <div class="part-btn" style="background: #444;" onclick="addComponent('NOT_IC')">🔳 NOT IC</div>
        </aside>

        <div id="viewport">
            <canvas id="cvs"></canvas>
        </div>
    </main>

    <script src="scripts/components.js"></script>
    <script src="scripts/engine.js"></script>
    <script src="scripts/save.js"></script>
    <script src="scripts/load.js"></script>
    <script src="scripts/ui.js"></script>
    <script src="scripts/main.js"></script>
</body>
</html>
